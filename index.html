<!DOCTYPE html>
<html lang="fil">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#faf6f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Aralin 1 - Filipino Vocabulary Interactive Learning">
  <title>M.I.K.A</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>



    <!-- Ambient Creative Background Nodes -->
    <div class="dash-bg-nodes">
      <div class="bg-node node-1"></div>
      <div class="bg-node node-2"></div>
      <div class="bg-node node-3"></div>
    </div>

  <!-- Loading Screen -->
  <div id="loadingScreen" class="loading-screen">
    <div class="loader-content">
      <div class="loader-icon">
        <div class="loader-spinner"></div>
        <div class="loader-sun-wrap">
          <svg class="loader-star star-top" viewBox="0 0 24 24" width="14" height="14">
            <polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" fill="#FCD116"/>
          </svg>
          <svg class="loader-star star-left" viewBox="0 0 24 24" width="12" height="12">
            <polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" fill="#FCD116"/>
          </svg>
          <svg class="loader-star star-right" viewBox="0 0 24 24" width="12" height="12">
            <polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" fill="#FCD116"/>
          </svg>
          <img src="assets/images/sunrays.png" alt="" class="loader-sun-img">
        </div>
      </div>
      <h1 class="loader-title">M.I.K.A</h1>
      <p class="loader-subtitle">Makabagong Interaktibong Kaalaman<br>sa Antas ng Bokabularyo</p>
    </div>
  </div>

  <!-- Dashboard Screen -->
  <div id="dashboard" class="dashboard hidden">
    
    <div class="dash-content">

      <!-- Top Bar -->
      <div class="dash-topbar">
        <img src="assets/images/MIKA_header.png" alt="M.I.K.A" class="dash-topbar-logo">
      </div>

      <!-- Greeting -->
      <div class="dash-hero">
        <div class="dash-hero-info">
          <p class="dash-hero-label">Magandang Araw!</p>
          <div class="dash-stars">
            <span class="star"></span>
            <span class="star"></span>
            <span class="star"></span>
          </div>
          <h2 class="dash-hero-greeting">Halina't pagyamanin ang ating wika!</h2>
        </div>
        <div class="dash-hero-sun">
          <img src="assets/images/sunrays.png" alt="">
        </div>
      </div>

      <!-- Section Label -->
      <div class="dash-section-header">
        <span class="dash-section-title">Mga Aralin</span>
      </div>

      <!-- Lesson Cards -->
      <div class="dash-lessons">

        <!-- Aralin 1 -->
        <div class="dash-card active" data-topic="bokabularyo">
          <div class="dash-card-icon">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#CE1126" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
              <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
              <line x1="9" y1="7" x2="15" y2="7"/>
              <line x1="9" y1="11" x2="13" y2="11"/>
            </svg>
          </div>
          <div class="dash-card-info">
            <span class="dash-card-label">ARALIN 1</span>
            <h3>Bokabularyo</h3>
            <p>Panimulang mga salita</p>
          </div>
          <button id="btnStartAralin1" class="dash-btn">Simulan →</button>
        </div>
        
        <!-- Aralin 2 -->
        <div id="cardAralin2" class="dash-card active" data-topic="konteksto">
          <div class="dash-card-icon">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#0038A8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              <line x1="8" y1="8" x2="16" y2="8"/>
              <line x1="8" y1="12" x2="13" y2="12"/>
            </svg>
          </div>
          <div class="dash-card-info">
            <span class="dash-card-label">ARALIN 2</span>
            <h3>Konteksto</h3>
            <p class="dash-card-desc">Mga salita sa konteksto</p>
          </div>
          <button id="btnStartAralin2" class="dash-btn">Simulan →</button>
        </div>

        <!-- Aralin 3 -->
        <div id="cardAralin3" class="dash-card active" data-topic="idyoma">
          <div class="dash-card-icon">
            <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#FCD116" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <div class="dash-card-info">
            <span class="dash-card-label">ARALIN 3</span>
            <h3>Idyoma</h3>
            <p class="dash-card-desc">Mga idyoma at sawikain</p>
          </div>
          <button id="btnStartAralin3" class="dash-btn">Simulan →</button>
        </div>

      </div>


      <!-- Footer -->
      <div class="dash-footer">
        <span>M.I.K.A &copy; 2026</span>
      </div>

    </div>
  </div>

  <!-- Main App Container -->
  <div id="app" class="app hidden">
    
    <!-- Top Header Bar -->
    <header id="headerBar" class="header-bar">
      <button id="btnFullscreen" class="header-btn" title="Fullscreen" aria-label="Fullscreen">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
      </button>
      <span id="headerTitle" class="header-title">Aralin 1</span>
      <span id="headerSubtitle" class="header-subtitle"></span>
    </header>

    <!-- Activity Container -->
    <main id="activityContainer" class="activity-container"></main>

    <!-- Bottom Navigation Bar -->
    <div class="nav-arrows">
      <button id="prevBtn" class="nav-arrow-btn prev" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>

      <!-- Center Section: Home + Progress -->
      <div class="nav-center">
        <button id="btnHome" class="home-btn" title="Bumalik sa Dashboard">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.47 3.841a.75.75 0 0 1 1.06 0l8.99 8.25a.75.75 0 1 1-1.018 1.118l-.512-.47V20.25h-5.25a.75.75 0 0 1-.75-.75v-4.5H10v4.5a.75.75 0 0 1-.75.75H4.25V12.73l-.512.47a.75.75 0 1 1-1.018-1.118l8.75-8.241z"/></svg>
        </button>
        <div class="nav-progress" id="navProgress"></div>
      </div>

      <button id="nextBtn" class="nav-arrow-btn next" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
    </div>
  </div>

  <!-- Hotspot Popup Overlay -->
  <div id="hotspotPopup" class="hotspot-popup hidden" role="dialog" aria-modal="true">
    <div class="popup-backdrop"></div>
    <div class="popup-content">
      <button class="popup-close" aria-label="Isara">&times;</button>
      <div class="popup-header">
        <h3 class="popup-title"></h3>
      </div>
      <div class="popup-divider"></div>
      <div class="popup-body"></div>
    </div>
  </div>

  <!-- Result/Feedback Overlay -->
  <div id="feedbackOverlay" class="feedback-overlay hidden">
    <div class="feedback-card">
      <div class="feedback-icon"></div>
      <h2 class="feedback-title"></h2>
      <p class="feedback-message"></p>
      <button class="feedback-btn" id="feedbackBtn">Magpatuloy</button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
