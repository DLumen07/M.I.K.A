<!DOCTYPE html>
<html lang="fil">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#5d4037">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Aralin 1 - Filipino Vocabulary Interactive Learning">
  <title>M.I.K.A</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Loading Screen -->
  <div id="loadingScreen" class="loading-screen">
    <div class="loader-content">
      <div class="loader-icon">
        <svg viewBox="0 0 100 100" width="80" height="80">
          <circle cx="50" cy="50" r="40" stroke="#ffca28" stroke-width="6" fill="none" stroke-dasharray="200" stroke-dashoffset="200">
            <animate attributeName="stroke-dashoffset" from="200" to="0" dur="1.5s" fill="freeze"/>
          </circle>
          <text x="50" y="58" text-anchor="middle" fill="#ffca28" font-size="28" font-weight="bold" font-family="'Comic Sans MS', cursive">K</text>
        </svg>
      </div>
      <h1 class="loader-title">M.I.K.A</h1>
      <p class="loader-subtitle">Inihahanda ang mga gawain...</p>
      <div class="loader-bar"><div class="loader-progress"></div></div>
    </div>
  </div>

  <!-- Dashboard Screen -->
  <div id="dashboard" class="dashboard hidden">
    <div class="dash-content">
      <div class="dash-header">
        <h1 class="app-logo">M.I.K.A</h1>
        <div class="app-meaning">Makabagong Interaktibong Kaalaman<br>sa Antas ng Bokabularyo</div>
        <p>Maligayang pagdating! Piliin ang aralin na nais mong pag-aralan.</p>
      </div>

      <div class="dash-grid">
        <!-- Aralin 1 (Active) -->
        <div class="dash-card active">
          <div class="dash-card-icon">1</div>
          <div class="dash-card-body">
            <h3>Aralin 1</h3>
            <p>Panimulang Aralin sa Filipino</p>
            <button id="btnStartAralin1" class="dash-btn">Magsimula</button>
          </div>
        </div>
        
        <!-- Aralin 2 -->
        <div id="cardAralin2" class="dash-card active">
          <div class="dash-card-icon">
            <span class="unlock-number">2</span>
          </div>
          <div class="dash-card-body">
            <h3>Aralin 2</h3>
            <p class="dash-card-desc">Mga Salita sa Konteksto</p>
            <button id="btnStartAralin2" class="dash-btn">Magsimula</button>
          </div>
        </div>

        <!-- Aralin 3 (Locked) -->
        <div class="dash-card locked">
          <div class="dash-card-icon">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor">
              <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
            </svg>
          </div>
          <div class="dash-card-body">
            <h3>Aralin 3</h3>
            <p>Malapit na!</p>
            <button class="dash-btn" disabled>Hindi pa maaaring buksan</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main App Container -->
  <div id="app" class="app hidden">
    
    <!-- Top Header Bar -->
    <header id="headerBar" class="header-bar">
      <button id="btnFullscreen" class="header-btn" title="Fullscreen" aria-label="Fullscreen">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
          <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
      </button>
      <span id="headerTitle" class="header-title">Aralin 1</span>
      <span id="headerSubtitle" class="header-subtitle"></span>
    </header>

    <!-- Activity Container -->
    <main id="activityContainer" class="activity-container"></main>

    <!-- Bottom Navigation Bar -->
    <div class="nav-arrows">
      <button id="prevBtn" class="nav-arrow-btn prev" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>

      <!-- Center Section: Home + Progress -->
      <div class="nav-center">
        <button id="btnHome" class="home-btn" title="Bumalik sa Dashboard">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.47 3.841a.75.75 0 0 1 1.06 0l8.99 8.25a.75.75 0 1 1-1.018 1.118l-.512-.47V20.25h-5.25a.75.75 0 0 1-.75-.75v-4.5H10v4.5a.75.75 0 0 1-.75.75H4.25V12.73l-.512.47a.75.75 0 1 1-1.018-1.118l8.75-8.241z"/></svg>
        </button>
        <div class="nav-progress" id="navProgress"></div>
      </div>

      <button id="nextBtn" class="nav-arrow-btn next" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
      </button>
    </div>
  </div>

  <!-- Hotspot Popup Overlay -->
  <div id="hotspotPopup" class="hotspot-popup hidden" role="dialog" aria-modal="true">
    <div class="popup-backdrop"></div>
    <div class="popup-content">
      <button class="popup-close" aria-label="Isara">&times;</button>
      <h3 class="popup-title"></h3>
      <div class="popup-body"></div>
    </div>
  </div>

  <!-- Result/Feedback Overlay -->
  <div id="feedbackOverlay" class="feedback-overlay hidden">
    <div class="feedback-card">
      <div class="feedback-icon"></div>
      <h2 class="feedback-title"></h2>
      <p class="feedback-message"></p>
      <button class="feedback-btn" id="feedbackBtn">Magpatuloy</button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
